<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <title>ACT Audio | Custom Car Audio & Vehicle Electronics | Vernon, CT</title>
  <meta name="description"
    content="ACT Audio in Vernon, CT offers custom car audio, window tinting, paint protection film, remote start, and vehicle safety upgrades. Certified technicians since 2000." />
  <meta name="author" content="ACT Audio, Inc." />

  <meta property="og:title" content="ACT Audio | Custom Car Audio & Vehicle Electronics" />
  <meta property="og:description"
    content="Custom car audio, window tinting, PPF, remote start & more in Vernon, CT. Certified technicians since 2000." />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:image" content="/favicon.png" />

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
  <script type="module">
    // Pin the embed version to avoid breaking changes in Flowise's widget API.
    import Chatbot from "https://cdn.jsdelivr.net/npm/flowise-embed@3.0.4/dist/web.js"
    Chatbot.init({
      chatflowid: "2f48334d-c810-4815-bd3b-7c56444d561f",
      apiHost: "https://cloud.flowiseai.com",
      theme: {
        button: {
          backgroundColor: '#d4772c',
          right: 20,
          bottom: 20,
          size: 56,
          dragAndDrop: true,
          iconColor: 'white',
          customIconSrc: '/images/chatbot-icon.png',
          autoWindowOpen: {
            autoOpen: true,
            openDelay: 2,
            autoOpenOnMobile: false
          }
        },
        tooltip: {
          showTooltip: true,
          tooltipMessage: 'Hi There 👋! Need help reguarding car',
          tooltipBackgroundColor: 'black',
          tooltipTextColor: 'white',
          tooltipFontSize: 16
        },
        customCSS: ``,
        chatWindow: {
          showTitle: true,
          showAgentMessages: false,
          title: 'ACT Audio Assistant',
          titleAvatarSrc: '/images/chatbot-icon.png',
          errorMessage: 'Oops, something went wrong. Please call us at 860-870-7676.',
          backgroundColor: '#ffffff',
          height: 700,
          width: 400,
          fontSize: 16,
          starterPrompts: [
            "Do you offer protection film for windshields?",
            "Can I add CarPlay or Android Auto to my older vehicle?",
            "How can I protect my new car from rock chips and scratches?"
          ],
          starterPromptFontSize: 15,
          clearChatOnReload: false,
          sourceDocsTitle: 'Sources:',
          renderHTML: true,
          botMessage: {
            backgroundColor: '#f7f8ff',
            textColor: '#303235',
            showAvatar: true,
            avatarSrc: '/images/bot-avatar.jpg'
          },
          userMessage: {
            backgroundColor: '#d4772c',
            textColor: '#ffffff',
            showAvatar: true,
            avatarSrc: '/images/user-avatar.jpg'
          },
          textInput: {
            placeholder: 'Type your question',
            backgroundColor: '#ffffff',
            textColor: '#303235',
            sendButtonColor: '#d4772c',
            maxChars: 3000,
            maxCharsWarningMessage: 'You exceeded the characters limit. Please input less than 50 characters.',
            autoFocus: true,
            sendMessageSound: true,
            receiveMessageSound: true
          },
          feedback: {
            color: '#303235'
          },
          dateTimeToggle: {
            date: true,
            time: true
          },
          footer: {
            textColor: '#303235',
            text: 'Powered by',
            company: 'ACT Audio',
            companyLink: 'https://www.actaudio.com'
          }
        }
      }
    })
  </script>
</body>

</html>
